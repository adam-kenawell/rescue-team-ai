{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rescue Team AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ── Full-screen chat (onboarding mode) ────────────── */
    #onboarding {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #onboarding-chat {
      width: 500px;
      max-width: 90vw;
      height: 80vh;
      background: #1a1a2e;
      border: 2px solid #333;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }

    #onboarding-header {
      padding: 12px 16px;
      border-bottom: 1px solid #333;
      font-weight: bold;
      font-size: 15px;
      text-align: center;
      color: #9090c0;
    }

    #onboarding-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ob-msg {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .ob-msg.system {
      align-self: flex-start;
      background: #16213e;
      color: #c0c0e0;
    }

    .ob-msg.user {
      align-self: flex-end;
      background: #2a2a4a;
      color: #e0e0e0;
    }

    .ob-msg.reveal {
      align-self: center;
      background: #1a3a2e;
      color: #80e0a0;
      font-weight: bold;
      text-align: center;
      border: 1px solid #2a5a3e;
    }

    #onboarding-input-area {
      display: flex;
      padding: 8px 12px;
      border-top: 1px solid #333;
      gap: 6px;
    }

    #onboarding-input {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #444;
      color: #e0e0e0;
      padding: 8px 10px;
      font-family: monospace;
      font-size: 13px;
      border-radius: 4px;
      outline: none;
    }

    #onboarding-input:disabled { opacity: 0.4; }

    #onboarding-send {
      background: #2a2a4a;
      border: 1px solid #444;
      color: #e0e0e0;
      padding: 8px 16px;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
      border-radius: 4px;
    }

    #onboarding-send:hover { background: #3a3a5a; }
    #onboarding-send:disabled { opacity: 0.4; cursor: default; }

    /* ── Split layout (game mode) ──────────────────────── */
    #game {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #000;
      align-items: center;
      justify-content: center;
    }

    #game-canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: 512 / 384;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <!-- Onboarding (full-screen chat) -->
  <div id="onboarding">
    <div id="onboarding-chat">
      <div id="onboarding-header">Rescue Team AI</div>
      <div id="onboarding-messages"></div>
      <div id="onboarding-input-area">
        <input id="onboarding-input" type="text" placeholder="Type your answer..." autocomplete="off" />
        <button id="onboarding-send">Send</button>
      </div>
    </div>
  </div>

  <!-- Game (canvas + chat side panel) -->
  <div id="game">
    <canvas id="game-canvas" width="512" height="384"></canvas>
  </div>

  <script type="importmap">
    { "imports": { "pmd-visualizer": "/static/pmd-visualizer/index.js" } }
  </script>
  <script type="module" src="{% static 'boot.js' %}"></script>
</body>
</html>
