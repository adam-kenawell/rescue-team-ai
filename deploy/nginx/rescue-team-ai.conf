server {
    listen 80;
    server_name rescue.adam.kenawell.family;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rescue.adam.kenawell.family;

    # SSL certs managed by Certbot - update paths after running:
    # sudo certbot --nginx -d rescue.adam.kenawell.family
    ssl_certificate /etc/letsencrypt/live/rescue.adam.kenawell.family/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rescue.adam.kenawell.family/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /static/ {
        alias /var/www/rescue-team-ai/staticfiles/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
